services:
  mysql:
    image: mysql:8.4
    container_name: soutenances-mysql
    restart: unless-stopped
    ports:
      - "${DB_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-change_me}
      MYSQL_DATABASE: ${DB_NAME:-soutenances_db}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p${DB_PASSWORD:-change_me}"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
