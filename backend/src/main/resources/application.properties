spring.application.name=gestion-soutenances
server.port=${SERVER_PORT:8080}

# Load optional local env file at project root (do not commit real secrets).
spring.config.import=optional:file:.env[.properties]

# MySQL
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:soutenances_db}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:change_me}

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Security
app.jwt.secret=${JWT_SECRET:}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:900000}
app.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

# First-admin bootstrap. Set ADMIN_PASSWORD in backend/.env before first run.
app.bootstrap.admin-username=${ADMIN_USERNAME:admin}
app.bootstrap.admin-email=${ADMIN_EMAIL:admin@example.local}
app.bootstrap.admin-password=${ADMIN_PASSWORD:}

# Optional demo database seed. Keep disabled outside local/dev environments.
app.bootstrap.demo-enabled=${DEMO_DATA_ENABLED:false}
app.bootstrap.demo-password=${DEMO_USER_PASSWORD:}
app.bootstrap.demo-seed-notes=${DEMO_SEED_NOTES:true}
